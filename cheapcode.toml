# cheapcode.toml — operator-side per-tier overrides (optional)
#
# Loaded by @cheapcode/ai-sdk-provider at startup. Per SPEC cell #11
# (zero env-var feature flags; one config file). Each key is a tier ID;
# value is the OpenRouter model ID that tier should route to.
#
# Defaults (Phase 0 locked decisions in runs/phase-0/decisions.md):
#   cheap       = deepseek/deepseek-v4-flash
#   cheap-fast  = deepseek/deepseek-v4-flash      (Phase 1 stub; Phase 2 race-K with gemini-2.5-flash)
#   smart       = openai/gpt-5-mini
#   smart-fast  = anthropic/claude-haiku-4.5
#   auto        = deepseek/deepseek-v4-flash      (Phase 1 STUB — Phase 2 wraps)
#
# Override examples below. Uncomment + edit to customize.

[tier_overrides]
# cheap       = "qwen/qwen-3.6-flash"
# cheap-fast  = "google/gemini-2.5-flash"
# smart       = "openai/gpt-5"
# smart-fast  = "openai/gpt-5-nano"
# auto        = "deepseek/deepseek-v4-flash"  # do NOT override past Phase 2 wrapper

[long_context]
# threshold_tokens = 128000  # default; route to grok-4-fast above this for cheap/auto tiers

[telemetry]
# app_name = "cheapcode"  # used in HTTP-Referer / X-Title for OpenRouter telemetry
